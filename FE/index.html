<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMSS UI Voting System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

@font-face{
font-family:"LydianBT";
src:url("fonts_lydian/lydianbt_roman.ttf") format("truetype");
font-weight:400;
font-style:normal;
}

@font-face{
font-family:"MontBlanc";
src:url("fonts_mont/MontBlanc-Trial-SemiBold.otf") format("opentype");
font-weight:600;
font-style:normal;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#1f1f1f;
color:#f6f4f2;
}

/* PAGE */

.page{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:opacity .5s;
}

.hidden{
opacity:0;
pointer-events:none;
}

/* TEXTURE */

.texture{
position:absolute;
width:100%;
height:100%;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:.15;
z-index:1;
pointer-events:none; /* IMPORTANT FIX */
}

/* THEMES */

.home{
background-image:url("IMSS (2).png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-color:#7a3139;
}

.vote{
background-image:url("background voting.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.success{
background-image:url("background voting.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}


/* HEADER */

.header{
position:absolute;
top:30px;
left:40px;
font-weight:700;
letter-spacing:2px;
font-size:14px;
opacity:.8;
}

.vote-back{
position:absolute;
top:24px;
left:28px;
z-index:3;
border:0;
padding:0;
background:rgba(0,0,0,.35);
color:#fff;
width:46px;
height:46px;
border-radius:999px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
line-height:1;
cursor:pointer;
backdrop-filter:blur(2px);
}

.vote-back:hover{
background:rgba(0,0,0,.55);
color:#fff;
}

.home-logos{
position:absolute;
top:0;
left:40px;
display:flex;
align-items:flex-start;
gap:0;
z-index:2;
}

.home-logo{
height:clamp(40px,6vw,80px);
width:auto;
display:block;
}

.slogan{
position:absolute;
top:30px;
right:40px;
text-align:left;
font-size:clamp(20px,2vw,40px);
opacity:1;
line-height:.92;
font-family:"LydianBT",serif;
letter-spacing:-.5px;
color:#e8e8e8;
text-shadow:3px 3px 0 rgba(0,0,0,.45);
z-index:2;
}

.cloud-right{
position:absolute;
right:-6%;
top:42%;
transform:translateY(-50%);
width:clamp(180px,28vw,420px);
height:auto;
z-index:0;
pointer-events:none;
}

.cloud-left{
position:absolute;
left:-6%;
top:42%;
transform:translateY(-50%);
width:clamp(180px,28vw,420px);
height:auto;
z-index:0;
pointer-events:none;
}

.cloud-bottom{
position:absolute;
left:0;
bottom:0;
width:100%;
height:auto;
z-index:0;
pointer-events:none;
}

.smoke-bottom{
position:absolute;
left:0;
bottom:0;
width:100%;
height:auto;
z-index:1;
pointer-events:none;
opacity:.58;
transform-origin:50% 100%;
will-change:transform,opacity;
animation:smokeFlow 7s ease-in-out infinite alternate;
}

@keyframes smokeFlow{
0%{
transform:translate3d(0,0,0) scale(1);
opacity:.42;
}
35%{
transform:translate3d(-2.4%, -12px, 0) scale(1.04);
opacity:.66;
}
70%{
transform:translate3d(2.4%, -20px, 0) scale(1.06);
opacity:.56;
}
100%{
transform:translate3d(1.2%, -28px, 0) scale(1.09);
opacity:.46;
}
}

/* HERO */

.hero{
max-width:800px;
text-align:center;
z-index:2;
}

.home .hero{
transform:translateY(-24px);
}

.hero h1{
font-size:64px;
margin-bottom:20px;
}

.home-title{
font-family:"MontBlanc",Inter,sans-serif;
font-weight:600;
letter-spacing:1px;
}

.hero p{
opacity:.8;
line-height:1.6;
margin-bottom:40px;
}

/* BUTTON */

button{
border:2px solid #fff;
background:transparent;
color:#fff;
padding:14px 32px;
border-radius:40px;
font-size:16px;
cursor:pointer;
transition:.25s;
}

button:hover{
background:#fff;
color:#c2410c;
}

.toast{
position:fixed;
top:24px;
left:50%;
z-index:20;
background:rgba(0,0,0,.82);
color:#fff;
border:1px solid rgba(255,255,255,.2);
border-radius:12px;
padding:12px 16px;
font-size:14px;
opacity:0;
transform:translate(-50%,-12px);
pointer-events:none;
transition:opacity .25s ease, transform .25s ease;
}

.toast.show{
opacity:1;
transform:translate(-50%,0);
}

.shake{
animation:shake .45s ease;
}

@keyframes shake{
0%,100%{transform:translateX(0);}
20%{transform:translateX(-7px);}
40%{transform:translateX(7px);}
60%{transform:translateX(-5px);}
80%{transform:translateX(5px);}
}

.success-box{
background:rgba(0,0,0,.35);
padding:50px 70px;
border-radius:12px;
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(6px);
text-align:center;
}

.success-icon{
font-size:50px;
margin-bottom:20px;
color:#22c55e;
}

/* VOTING */

.vote-container{
display:flex;
gap:50px;
margin-top:30px;
}

.vote-container{
display:flex;
gap:60px;
margin-top:50px;
}

.candidate{
width:360px;
border-radius:12px;
overflow:hidden;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(4px);
transition:.35s;
cursor:pointer;
}



.candidate:hover{
transform:translateY(-8px) scale(1.03);
border-color:rgba(255,255,255,.25);
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

.candidate img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block;
}

.candidate-info{
padding:24px 22px 28px 22px;
text-align:center;
display:flex;
flex-direction:column;
min-height:180px;
}

.candidate-number{
font-size:14px;
opacity:.6;
letter-spacing:2px;
}

.candidate-name{
font-size:20px;
font-weight:600;
margin-top:8px;
margin-bottom:16px;
line-height:1.35;
min-height:60px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.candidate button{
margin-top:auto;
margin-bottom:6px;
}

.empty{
border-style:dashed;
}

/* SUCCESS */

.tx{
margin-top:20px;
font-family:monospace;
letter-spacing:2px;
opacity:.8;
}

/* RESPONSIVE (does not affect normal desktop layout) */

@media (max-width:1024px){
body{
overflow:auto;
}

.page{
overflow-y:auto;
padding:24px 18px 28px;
}

.home .hero{
transform:translateY(-6px);
}

.home-logos{
left:18px;
top:4px;
}

.home-logo{
height:clamp(34px,8vw,60px);
}

.slogan{
top:18px;
right:18px;
font-size:clamp(16px,3.6vw,28px);
}

.cloud-left{
left:-18%;
top:40%;
width:clamp(140px,40vw,320px);
}

.cloud-right{
right:-18%;
top:40%;
width:clamp(140px,40vw,320px);
}

.hero{
max-width:92vw;
}

.hero h1{
font-size:clamp(38px,8vw,64px);
}

.vote .hero h1{
font-size:clamp(30px,7vw,42px) !important;
}

.vote-container{
gap:22px;
margin-top:26px;
flex-direction:column;
align-items:center;
}

.candidate{
width:min(92vw,430px);
}

.candidate-info{
min-height:152px;
padding:18px 16px 22px;
}

.candidate-name{
font-size:18px;
min-height:auto;
}

.success-box{
width:min(92vw,640px);
padding:34px 24px;
}

.tx{
font-size:13px;
letter-spacing:1.2px;
word-break:break-word;
}

.vote-back{
top:16px;
left:14px;
width:42px;
height:42px;
font-size:24px;
}
}

@media (max-width:560px){
.home .hero{
transform:translateY(18px);
}

.home-title{
letter-spacing:.5px;
}

button{
padding:12px 24px;
font-size:15px;
}

.smoke-bottom{
width:150%;
left:-25%;
}

.cloud-bottom{
width:130%;
left:-15%;
}
}

@media (min-width:1400px){
.home{
background-position:center 45%;
}

.home-logos{
left:28px;
}

.slogan{
right:28px;
}

.cloud-left{
left:-2%;
top:45%;
width:clamp(160px,22vw,360px);
}

.cloud-right{
right:-2%;
top:45%;
width:clamp(160px,22vw,360px);
}

.cloud-bottom{
left:-2%;
width:104%;
}

.smoke-bottom{
left:-3%;
width:106%;
}
}

</style>
</head>

<body>

<!-- HOME -->

<div class="page home" id="home">

<div class="texture"></div>

<div class="home-logos">
<img class="home-logo" src="logo imss.png" alt="IMSS Logo">
<img class="home-logo" src="logo ui.png" alt="UI Logo">
</div>

<div class="slogan">
Sipakatau<br>
Sipakalebbi<br>
Sipakainge
</div>

<img class="cloud-left" src="awan kiri.svg" alt="">
<img class="cloud-right" src="awan kanan.svg" alt="">
<img class="cloud-bottom" src="awan bawah.svg" alt="">
<img class="smoke-bottom" src="smoke.svg" alt="">

<div class="hero">

<h1 class="home-title">PEMIRA IMSS UI</h1>


<button id="voteBtn">VOTE NOW</button>

</div>

</div>


<!-- VOTE -->

<div class="page vote hidden" id="vote">

<div class="texture"></div>

<button class="vote-back" id="voteBackBtn" aria-label="Kembali ke halaman utama">&#8592;</button>

<div class="hero">

<h1 style="font-size:42px;">PILIH KETUA UMUM</h1>

<div class="vote-container">

<div class="candidate" data-choice="Paslon 1">

<img src="Paslon1.jpg">

<div class="candidate-info">

<div class="candidate-number">PASLON 01</div>

<div class="candidate-name">
Rifqi Ramadhani<br>
M Naufal Zhafran
</div>

<button>PILIH</button>

</div>

</div>


<div class="candidate" data-choice="Kotak Kosong">

<img src="kotakkosong.jpg">

<div class="candidate-info">

<div class="candidate-number">KOTAK KOSONG</div>

<div class="candidate-name">
Tidak memilih kandidat
</div>

<button>PILIH</button>

</div>

</div>

</div>

</div>

</div>


<!-- SUCCESS -->

<div class="page success hidden" id="success">

<div class="texture"></div>

<div class="hero">

<div class="success-box">


<h1>VOTE RECORDED</h1>

<p>
Terima kasih telah menggunakan Hak Pilih Anda!
</p>

<div class="tx" id="txid"></div>

<br>

<button id="backBtn">BACK TO HOME</button>

</div>

</div>

</div>

<div class="toast" id="voteToast" role="status" aria-live="polite">
Anda sudah menggunakan hak pilih
</div>

<script>

/* NAVIGATION */

const home = document.getElementById("home")
const vote = document.getElementById("vote")
const success = document.getElementById("success")
const voteBtn = document.getElementById("voteBtn")
const voteToast = document.getElementById("voteToast")
let hasVoted = false
let toastTimer = null

function showToast(message){
voteToast.innerText = message
voteToast.classList.add("show")
clearTimeout(toastTimer)
toastTimer = setTimeout(()=>{
voteToast.classList.remove("show")
}, 2200)
}

voteBtn.onclick = () => {

if(hasVoted){
showToast("Anda sudah menggunakan hak pilih")
voteBtn.classList.remove("shake")
void voteBtn.offsetWidth
voteBtn.classList.add("shake")
return
}

home.classList.add("hidden")
vote.classList.remove("hidden")

}

document.getElementById("voteBackBtn").onclick = () => {

vote.classList.add("hidden")
home.classList.remove("hidden")

}

/* VOTING */

document.querySelectorAll(".candidate").forEach(card=>{

card.onclick = ()=>{

hasVoted = true

vote.classList.add("hidden")
success.classList.remove("hidden")

let tx = "0x" + Math.random().toString(16).substring(2,14)

document.getElementById("txid").innerText =
"Transaction ID : " + tx

}

})

/* BACK */

document.getElementById("backBtn").onclick = ()=>{

success.classList.add("hidden")
home.classList.remove("hidden")

}

</script>

</body>
</html>
